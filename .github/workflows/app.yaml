---
name: app

on: [push]

defaults:
  run:
    working-directory: ./app

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - uses: jdx/mise-action@5bb8f8c1911837cf42064e6490e7634fc842ee7e # v2
      with:
        version: 2024.10.7
        install: true
        experimental: true
    - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5
      with:
        go-version: '1.23.4'
        cache-dependency-path: 'app/go.sum'
    - run: go mod tidy
    - run: task gen
    - name: Save task cache
      uses: actions/cache/save@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
      with:
        path: ./.task
        key: task-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.task/checksum/*') }}
    - name: Check git status
      run: if [[ -n $(git status --porcelain) ]]; then git status --porcelain && exit 1; fi

  lint:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - name: Restore task cache
      uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
      with:
        path: ./.task
        key: task-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.task/checksum/*') }}
    - uses: jdx/mise-action@5bb8f8c1911837cf42064e6490e7634fc842ee7e # v2
      with:
        version: 2024.10.7
        install: false
    - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5
      with:
        go-version: '1.23.4'
        cache-dependency-path: 'app/go.sum'
    - uses: golangci/golangci-lint-action@971e284b6050e8a5849b72094c50ab08da042db8 # v6
      with:
        version: v1.61.0
        working-directory: ./app
        args: --path-prefix=./

  test:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - name: Restore task cache
      uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
      with:
        path: ./.task
        key: task-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.task/checksum/*') }}
    - uses: jdx/mise-action@5bb8f8c1911837cf42064e6490e7634fc842ee7e # v2
      with:
        version: 2024.10.7
        install: false
    - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5
      with:
        go-version: '1.23.4'
        cache-dependency-path: 'app/go.sum'
    - run: task test

  build:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - name: Restore task cache
      uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
      with:
        path: ./.task
        key: task-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.task/checksum/*') }}
    - uses: jdx/mise-action@5bb8f8c1911837cf42064e6490e7634fc842ee7e # v2
      with:
        version: 2024.10.7
        install: false
    - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5
      with:
        go-version: '1.23.4'
        cache-dependency-path: 'app/go.sum'
    - run: task build
