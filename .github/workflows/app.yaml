---
name: app

on: [push]

defaults:
  run:
    working-directory: ./app

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v2
      with:
        version: 2024.10.7
        install: true
        install_args: 'atlas task protoc protoc-gen-go protoc-gen-go-grpc'
    - uses: actions/setup-go@v5
      with:
        go-version: '1.23.2'
        cache-dependency-path: 'app/go.sum'
    - run: go mod tidy
    - uses: actions/cache@v4
      id: task-cache
      with:
        path: ./.task
        key: ${{ runner.os }}-${{ runner.arch }}-task-${{ hashFiles('./task/checksum/*') }}
    - run: task gen
      if: steps.task-cache.outputs.cache-hit != 'true'
    - name: check diff
      run: if [[ -n $(git status --porcelain) ]]; then git status --porcelain && exit 1; fi

  test:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: ./.task
        key: ${{ runner.os }}-${{ runner.arch }}-task-${{ hashFiles('./task/checksum/*') }}
    - uses: jdx/mise-action@v2
      with:
        version: 2024.10.7
        install: false
    - uses: actions/setup-go@v5
      with:
        go-version: '1.23.2'
        cache-dependency-path: 'app/go.sum'
    - run: task test
