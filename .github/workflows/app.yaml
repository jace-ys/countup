---
name: app

on: [push]

defaults:
  run:
    working-directory: ./app

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - uses: jdx/mise-action@5083fe46898c414b2475087cc79da59e7da859e8 # v2
      with:
        version: 2024.10.7
        install: true
        experimental: true
    - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5
      with:
        go-version: '1.23.4'
        cache-dependency-path: 'app/go.sum'
    - run: go mod tidy
    - run: task gen
    - name: Save task cache
      uses: actions/cache/save@0c907a75c2c80ebcb7f088228285e798b750cf8f # v4
      with:
        path: ./.task
        key: task-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.task/checksum/*') }}
    - name: Check git status
      run: if [[ -n $(git status --porcelain) ]]; then git status --porcelain && exit 1; fi

  lint:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - name: Restore task cache
      uses: actions/cache/restore@0c907a75c2c80ebcb7f088228285e798b750cf8f # v4
      with:
        path: ./.task
        key: task-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.task/checksum/*') }}
    - uses: jdx/mise-action@5083fe46898c414b2475087cc79da59e7da859e8 # v2
      with:
        version: 2024.10.7
        install: false
    - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5
      with:
        go-version: '1.23.4'
        cache-dependency-path: 'app/go.sum'
    - uses: golangci/golangci-lint-action@2226d7cb06a077cd73e56eedd38eecad18e5d837 # v6
      with:
        version: v1.64.5
        working-directory: ./app
        args: --path-prefix=./

  test:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - name: Restore task cache
      uses: actions/cache/restore@0c907a75c2c80ebcb7f088228285e798b750cf8f # v4
      with:
        path: ./.task
        key: task-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.task/checksum/*') }}
    - uses: jdx/mise-action@5083fe46898c414b2475087cc79da59e7da859e8 # v2
      with:
        version: 2024.10.7
        install: false
    - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5
      with:
        go-version: '1.23.4'
        cache-dependency-path: 'app/go.sum'
    - run: task test

  build:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - name: Restore task cache
      uses: actions/cache/restore@0c907a75c2c80ebcb7f088228285e798b750cf8f # v4
      with:
        path: ./.task
        key: task-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.task/checksum/*') }}
    - uses: jdx/mise-action@5083fe46898c414b2475087cc79da59e7da859e8 # v2
      with:
        version: 2024.10.7
        install: false
    - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5
      with:
        go-version: '1.23.4'
        cache-dependency-path: 'app/go.sum'
    - run: task build
